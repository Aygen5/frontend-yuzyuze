<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeScript Temel Tipler</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typescript/5.0.4/typescript.min.js"></script>
</head>

<body class="p-6 bg-gray-100"><center></center>


<div class="p-6 bg-white w-96">

    <h1 class="text-xl font-bold mb-4">TypeScript Temel Tipler</h1>

   
    <div class="mb-4">
        <label class="block text-xs">Öğrenci Adı</label>
        <input type="text" id="input-name" value="Ahmet" class="p-1 border w-full">
    </div>

   
    <div class="mb-4">
        <label class="block text-xs">Öğrenci Yaşı</label>
        <input type="number" id="input-age" value="16" class="p-1 border w-full">
    </div>

  
    <div class="mb-4">
        <label class="block text-xs">Öğrenci mi?</label>
        <input type="checkbox" id="input-student">
    </div>

    <button id="btn-run" class="p-2 bg-indigo-300 w-full">
        Verileri İşle
    </button>

    <div id="result" class="mt-4 p-2 bg-gray-100">
        Sonuç Bekleniyor
    </div>

</div></center>




<script>

window.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('script[type="text/typescript"]').forEach(script => {
        const js = window.ts.transpile(script.textContent);
        const newScript = document.createElement('script');
        newScript.textContent = js;
        document.body.appendChild(newScript);
    });
});
</script>


<script type="text/typescript">
const output = document.getElementById('result') as HTMLDivElement;

document.getElementById('btn-run')!.addEventListener('click', () => {

    const ad = (document.getElementById('input-name') as HTMLInputElement).value;

    const yas = Number(
        (document.getElementById('input-age') as HTMLInputElement).value
    );

    const ogrencimi = (document.getElementById('input-student') as HTMLInputElement).checked;

    const hamVeri: any = "İşlem Tamamlandı";

    output.className = 'mt-4 p-2 bg-green-200';

    output.innerText =
        hamVeri +
        " | Ad: " + ad +
        " | Yaş: " + yas +
        " | Öğrenci Durumu: " + (ogrencimi ? "Öğrenci" : "Değil");

});

</script>

</body>
</html>
